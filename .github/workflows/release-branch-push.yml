name: Pull Request

on:
  pull_request:
    branches: [ "main", "release/**" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout 
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          9.0.x

    - name: Restore
      run: dotnet restore TestResponses.slnx

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Save build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: test-responses-build-${{ github.sha }}
        path: |
          ./**/bin/**
          ./**/obj/**

  test: 
    runs-on: ubuntu-latest
    needs: build
    steps:
        
    - name: Checkout 
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          9.0.x
    
    - name: Restore build artifacts
      uses: actions/download-artifact@v8
      with:
        name: test-responses-build-${{ github.sha }}
        
    - name: Show tests
      run: dotnet test --no-build --filter 'FullyQualifiedName!~.Examples.' --list-tests

    - name: Test
      run: dotnet test  --filter 'FullyQualifiedName!~.Examples.'
name: Pull Request

on:
  pull_request:
    branches: [ "main", "release/**" ]

env:
  NUGET_SERVER: https://api.nuget.org
  # NUGET_SERVER: https://nugettest.org


jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:

    - name: Checkout 
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          9.0.x

    - name: Restore
      run: dotnet restore TestResponses.slnx

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Test
      run: dotnet test -c Release --no-build --filter 'FullyQualifiedName!~.Example.'

  pack: 
    name: Pack packages
    runs-on: ubuntu-latest
    needs: test

    steps:
        
    - name: Checkout 
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          9.0.x
        
    - name: Restore
      run: dotnet restore TestResponses.slnx

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Pack
      run: dotnet pack -c Release --no-build

    - name: Get desired version
      run: |
        VERSION=$(grep -oP '<PackageUnifiedVersion>\K[^<]+' Directory.Build.props)
        echo "DESIRED_VERSION=$VERSION" >> $GITHUB_ENV
    
    - name: Get published versions
      run: |
        VERSIONS=$(curl -s "$NUGET_SERVER/v3-flatcontainer/testresponses/index.json" | jq -r '.versions[]')
        echo "EXISTING_VERSIONS=$VERSIONS" >> $GITHUB_ENV
    
    - name: Validate version
      run: echo ${{ env.DESIRED_VERSION }}
        

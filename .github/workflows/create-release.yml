name: Release package

on: 
  push:
    branches: [ "main" ]

env:
  NUGET_API_SERVER: https://api.nuget.org
  NUGET_WEBSITE: https://www.nuget.org
  # NUGET_API_SERVER: https://apiint.nugettest.org
  # NUGET_WEBSITE: https://int.nugettest.org

jobs:

  release:
    name: Create Release and Publish
    runs-on: ubuntu-latest

    environment: release

    permissions:
      contents: write 
      id-token: write 

    steps:

    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0 

    - name: Initialize and Build
      uses: ./.github/actions/build

    - name: Pack
      run: dotnet pack -c Release --no-build --output ./nuget/

    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@v1
      id: login
      with:
        user: ${{ secrets.NUGET_USER }} 
        token-service-url: ${{ env.NUGET_WEBSITE }}/api/v2/token
        audience: ${{ env.NUGET_WEBSITE }}

    - name: Push packages to NuGet
      run: dotnet nuget push ./nuget/*.nupkg --source $NUGET_API_SERVER/v3/index.json --api-key ${{ steps.login.outputs.NUGET_API_KEY }}

    - name: Get and validate package version
      run: |
        VERSION=$(grep -oP '<PackageUnifiedVersion>\K[^<]+' Directory.Build.props)
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ env.VERSION }}
        files: |
          ./nupkg/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
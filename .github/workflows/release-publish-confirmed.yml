name: Publish packages from release

on: 
  release:
    types:
      - published

env:
  NUGET_API_SERVER: https://api.nuget.org
  NUGET_WEBSITE: https://www.nuget.org
  # NUGET_API_SERVER: https://apiint.nugettest.org
  # NUGET_WEBSITE: https://int.nugettest.org

jobs:

  release:
    name: Publish packages
    runs-on: ubuntu-latest

    environment: release

    permissions:
      id-token: write 

    steps:

    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0 

    - name: Download packages from release
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh release download ${{ github.event.release.tag_name }} --pattern "*.nupkg" --pattern "*.snupkg" --dir ./packages
      
    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@v1
      id: login
      with:
        user: ${{ secrets.NUGET_USER }} 
        token-service-url: ${{ env.NUGET_WEBSITE }}/api/v2/token
        audience: ${{ env.NUGET_WEBSITE }}
    
    - name: Check files
      run: ls -R ./packages
    #- name: Push packages to NuGet
    #  run: dotnet nuget push ./nuget/*.nupkg --source $NUGET_API_SERVER/v3/index.json --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
